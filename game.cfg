# game.cfg — The Legend of Zelda (NES, Mapper 1 / MMC1, 8 PRG banks, CHR RAM)
output_prefix zelda

# ── Bank switch routine ─────────────────────────────────────────────────────
# $FFAC: switches the MMC1 mapper to the bank in A register.
# Register propagation uses this to resolve which bank subsequent JSR/JMP
# targets belong to (instead of adding for all switchable banks).
bank_switch FFAC

# ── Inline dispatch ─────────────────────────────────────────────────────────
# $E5E2: ASL A; TAY; PLA×2 (return addr); LDA ($00),Y ×2; JMP ($0002)
# Reads a 2-byte LE address table indexed by A right after the JSR.
inline_dispatch E5E2

# ── SRAM code mapping ────────────────────────────────────────────────────────
# Zelda copies bank 1 ROM $A500→SRAM $6C90 during init (~$1370 bytes).
# sram_map tells the analyzer to translate JSR/JMP targets in the SRAM range
# back to ROM addresses, auto-discovering SRAM-dispatched functions.
sram_map 6C90 A500 1 1370

# Functions not discoverable via static analysis (called indirectly)
extra_func 1 A69D
extra_func -1 E6B8

# ── SRAM dynamic dispatch targets ─────────────────────────────────────────
# SRAM-sourced functions bank-switch at runtime and then call utility
# routines in the switchable bank range ($8000-$BFFF). These routines
# exist in every PRG bank but aren't discovered by static analysis for
# banks other than 1. Add them for all switchable banks (0-6).
#
# $BFAC = MMC1 bank switch routine (copy of $FFAC in switchable range)
# $BF98 = utility function called after bank switch
extra_func 0 BFAC
extra_func 0 BF98
extra_func 1 BFAC
extra_func 1 BF98
extra_func 2 BFAC
extra_func 2 BF98
extra_func 3 BFAC
extra_func 3 BF98
extra_func 4 BFAC
extra_func 4 BF98
extra_func 5 BFAC
extra_func 5 BF98
extra_func 6 BFAC
extra_func 6 BF98
