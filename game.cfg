# game.cfg — The Legend of Zelda (NES, Mapper 1 / MMC1, 8 PRG banks, CHR RAM)
output_prefix zelda

# ── Inline dispatch ─────────────────────────────────────────────────────────
# $E5E2: ASL A; TAY; PLA×2 (return addr); LDA ($00),Y ×2; JMP ($0002)
# Reads a 2-byte LE address table indexed by A right after the JSR.
inline_dispatch E5E2

# ── SRAM code entry points ───────────────────────────────────────────────────
# Zelda copies bank 1 ROM $A500→SRAM $6C90 during init.
# The game calls into SRAM for save file management (bank switching from SRAM).
# We recompile the ROM source and redirect SRAM calls at runtime (extras.c).
extra_func 1 A5C0
extra_func 1 A5F0
extra_func 1 A627
extra_func 1 A661
extra_func 1 A68D
extra_func 1 A69D
extra_func 1 A6A6
extra_func 1 A6A9
extra_func 1 A6B0
extra_func 1 A6E9
extra_func 1 A759
extra_func 1 A831
extra_func 1 A883
extra_func 1 AA4E
extra_func 1 AAB8
extra_func 1 AAE6
extra_func 1 AAFC
extra_func 1 AAFE
extra_func 1 AB84
extra_func 1 B057
extra_func 1 B0F5
extra_func 1 B1F8
